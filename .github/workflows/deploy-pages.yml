name: Deploy to GitHub Pages

# Publishes the static games to GitHub Pages whenever this branch updates.
# One-time setup: in the repo, go to Settings -> Pages and set
# "Build and deployment" -> Source to "GitHub Actions".
on:
  push:
    branches:
      - claude/space-waves-game-pacing-b9ea72
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deploy at a time; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo is the static site (root index.html + game folders).
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
