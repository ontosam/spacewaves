<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Star Blaster — Kid Edition</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💥</text></svg>" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #05030f;
    font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    color: #eaf2ff; touch-action: none; user-select: none;
  }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas {
    display: block; width: 100%; height: 100%;
    background: linear-gradient(180deg, #1a0b3a 0%, #0b0826 60%, #05030f 100%);
    filter: saturate(1.4) brightness(1.06);
  }

  .overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    background: radial-gradient(120% 120% at 50% 30%, rgba(60,30,110,.5), rgba(5,3,15,.92));
    backdrop-filter: blur(3px);
  }
  .hidden { display: none !important; }

  h1 {
    font-size: clamp(38px, 11vw, 80px); margin: 0;
    color: #ffd54a; letter-spacing: 2px;
    text-shadow: 0 4px 0 #b9560a, 0 0 22px rgba(255,170,80,.6);
  }
  h1 .sub { display:block; font-size: clamp(13px,3.6vw,20px); letter-spacing:6px; color:#ff9a76; text-shadow:none; margin-top:6px; }
  p.tip { font-size: clamp(15px, 4vw, 20px); color: #d8d0ff; max-width: 470px; line-height: 1.55; }

  .speeds { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin: 16px 0 4px; }
  .btn {
    cursor: pointer; border: none; border-radius: 16px; margin-top: 8px;
    padding: 16px 26px; font-size: clamp(17px, 4.6vw, 24px); font-weight: bold;
    color: #06081a; background: #ffd166;
    box-shadow: 0 6px 0 #b9923a, 0 10px 22px rgba(0,0,0,.4);
    transition: transform .06s ease, box-shadow .06s ease;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b9923a, 0 6px 14px rgba(0,0,0,.4); }
  .btn.pink { background: #ff9ad1; box-shadow: 0 6px 0 #b35a86, 0 10px 22px rgba(0,0,0,.4); }
  .btn.pink:active { box-shadow: 0 2px 0 #b35a86, 0 6px 14px rgba(0,0,0,.4); }
  .btn.speed { background: #b3a7ff; box-shadow: 0 6px 0 #6c5ce7, 0 10px 22px rgba(0,0,0,.4); }
  .btn.speed:active { box-shadow: 0 2px 0 #6c5ce7, 0 6px 14px rgba(0,0,0,.4); }
  .btn.speed .lab { display:block; font-size: .6em; font-weight: normal; opacity: .85; margin-top: 2px; }
  .btn.speed.sel { outline: 4px solid #fff; }

  #hud {
    position: fixed; top: 12px; left: 0; right: 0; z-index: 5;
    display: flex; justify-content: center; align-items: center; gap: 26px;
    font-size: clamp(20px, 6vw, 30px); font-weight: bold;
    text-shadow: 0 2px 4px rgba(0,0,0,.6); pointer-events: none;
  }
  #hud .lbl { font-size: .5em; color: #c9b8ff; display:block; text-align:center; }
  #hudLives { font-size: clamp(20px, 6vw, 30px); letter-spacing: 2px; }
  .score-big { font-size: clamp(44px, 13vw, 96px); margin: 6px 0; color:#ffd54a; text-shadow:0 4px 0 #b9560a; }
  .best { color: #c9b8ff; font-size: clamp(15px, 4vw, 20px); }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>

<div id="hud" class="hidden">
  <div><span class="lbl">SCORE</span><span id="hudScore">0</span></div>
  <div id="hudLives">❤️❤️❤️</div>
  <div><span class="lbl">BEST</span><span id="hudBest">0</span></div>
</div>

<div id="startScreen" class="overlay">
  <h1>Star&nbsp;Blaster<span class="sub">KID EDITION</span></h1>
  <p class="tip"><b>Slide your finger</b> to move your ship.<br>It shoots all by itself! 🔫✨<br>Pop the space rocks before they get past you.</p>
  <p class="tip" style="margin-top:2px">Pick how fast:</p>
  <div class="speeds" id="speedPicker"></div>
  <button class="btn" id="playBtn">▶ Play</button>
</div>

<div id="overScreen" class="overlay hidden">
  <h1 style="font-size:clamp(30px,9vw,62px)">Great blasting! 💥</h1>
  <div class="score-big" id="finalScore">0</div>
  <div class="best">Best: <span id="bestScore">0</span></div>
  <button class="btn" id="againBtn">↻ Play Again</button>
  <button class="btn speed" id="menuBtn">⚙ Change Speed</button>
</div>

<script>
(() => {
  "use strict";
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  // ---- Difficulty presets (gentle for a young kid) ----
  // spawn   = seconds between new targets (smaller = busier)
  // fall    = target downward speed (px/s)
  // fire    = seconds between the ship's auto-shots (smaller = faster shooting)
  // ramp    = how much it speeds up over time (0 = stays calm)
  const PRESETS = {
    baby:   { label: "Baby",   sub: "super calm", spawn: 1.5, fall: 70,  fire: 0.28, ramp: 0.0 },
    easy:   { label: "Easy",   sub: "for kids",   spawn: 1.1, fall: 95,  fire: 0.26, ramp: 0.10 },
    normal: { label: "Normal", sub: "a challenge",spawn: 0.8, fall: 125, fire: 0.24, ramp: 0.22 },
  };
  let difficulty = localStorage.getItem("sb_diff") || "easy";

  // ---- Canvas ----
  let W=0, H=0, DPR=1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.floor(W*DPR); canvas.height = Math.floor(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener("resize", resize);
  resize();

  // ---- Stars ----
  let stars = [];
  function makeStars() {
    stars = [];
    const n = Math.round((W*H)/9000);
    for (let i=0;i<n;i++) stars.push({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.6+0.4, s:Math.random()*40+18 });
  }
  makeStars();
  window.addEventListener("resize", makeStars);

  // ---- State (init all arrays up front so draw() never throws on the menu) ----
  const STATE = { MENU:0, PLAY:1, OVER:2 };
  let state = STATE.MENU;
  let ship = { x: 0, y: 0, r: 26 };
  let targetX = 0;
  let bullets = [], enemies = [], particles = [], floaters = [];
  let cfg = PRESETS[difficulty];
  let score = 0, lives = 3, best = +(localStorage.getItem("sb_best_"+difficulty) || 0);
  let spawnTimer = 0, fireTimer = 0, elapsed = 0;
  let powerUntil = 0; // triple-shot timer (seconds of elapsed)

  const ENEMY_TYPES = [
    { kind:"rock",  r:24, hp:1, color:"#b08968", color2:"#e0c4a0", pts:1, wob:0 },
    { kind:"rock",  r:34, hp:2, color:"#8d6e63", color2:"#cda98f", pts:2, wob:0 },
    { kind:"alien", r:22, hp:1, color:"#7ed957", color2:"#c6ff8f", pts:2, wob:1 },
    { kind:"alien", r:22, hp:1, color:"#9b8cff", color2:"#d6c0ff", pts:2, wob:1 },
  ];

  function reset() {
    cfg = PRESETS[difficulty];
    ship = { x: W/2, y: H - Math.max(90, H*0.12), r: Math.max(20, Math.min(30, W*0.05)) };
    targetX = ship.x;
    bullets = []; enemies = []; particles = []; floaters = [];
    score = 0; lives = 3;
    spawnTimer = 0.5; fireTimer = 0; elapsed = 0; powerUntil = 0;
    best = +(localStorage.getItem("sb_best_"+difficulty) || 0);
    updateHud();
  }

  // ---- Input: ship follows finger/mouse; auto-fires ----
  function setTarget(e){ targetX = e.clientX; }
  canvas.addEventListener("pointerdown", (e)=>{ e.preventDefault(); setTarget(e); });
  canvas.addEventListener("pointermove", (e)=>{ if (e.pressure>0 || e.buttons || e.pointerType!=="mouse") setTarget(e); else setTarget(e); });
  window.addEventListener("keydown", (e)=>{
    if (state!==STATE.PLAY) return;
    if (e.code==="ArrowLeft") targetX = Math.max(ship.r, ship.x - 60);
    if (e.code==="ArrowRight") targetX = Math.min(W-ship.r, ship.x + 60);
  });

  // ---- Loop ----
  let last = 0;
  function frame(t){
    const dt = Math.min((t-last)/1000, 0.033) || 0;
    last = t;
    if (state===STATE.PLAY) update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  function update(dt){
    elapsed += dt;
    const rampMul = 1 + (cfg.ramp * Math.min(elapsed/60, 1)); // eases up over the first minute

    // ship easing toward finger
    ship.x += (targetX - ship.x) * Math.min(1, dt*12);
    ship.x = Math.max(ship.r, Math.min(W-ship.r, ship.x));

    // auto-fire
    fireTimer -= dt;
    const firing = fireTimer <= 0;
    if (firing) {
      fireTimer = cfg.fire / (elapsed<powerUntil ? 1.6 : 1);
      const tri = elapsed < powerUntil;
      shoot(0);
      if (tri) { shoot(-0.32); shoot(0.32); }
    }

    // spawn enemies
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnTimer = cfg.spawn / rampMul * (0.7 + Math.random()*0.6);
      spawnEnemy(rampMul);
    }

    // move bullets
    for (const b of bullets) b.y += b.vy * dt;
    bullets = bullets.filter(b => b.y > -20);

    // move enemies
    for (const en of enemies) {
      en.y += en.vy * dt;
      if (en.wob) en.x += Math.sin(elapsed*2.5 + en.seed) * en.wobAmp * dt;
      en.x = Math.max(en.r, Math.min(W-en.r, en.x));
    }

    // bullet vs enemy
    for (const en of enemies) {
      if (en.dead) continue;
      for (const b of bullets) {
        if (b.dead) continue;
        const dx=b.x-en.x, dy=b.y-en.y, rr=en.r+b.r;
        if (dx*dx+dy*dy < rr*rr) {
          b.dead = true;
          en.hp -= 1;
          burst(b.x, en.y-en.r*0.4, en.color2, 5);
          if (en.hp <= 0) { en.dead = true; score += en.pts; addFloat(en.x, en.y, "+"+en.pts); burst(en.x, en.y, en.color2, 16);
            if (Math.random() < 0.06) spawnPower(en.x, en.y); }
          break;
        }
      }
    }
    bullets = bullets.filter(b => !b.dead);

    // power-up pickups (floaters list reused for falling stars)
    for (const p of floaters) {
      if (p.kind!=="power") continue;
      p.y += p.vy*dt;
      const dx=p.x-ship.x, dy=p.y-ship.y, rr=p.r+ship.r;
      if (dx*dx+dy*dy < rr*rr) { p.dead=true; powerUntil = elapsed + 6; addFloat(ship.x, ship.y-30, "POWER!"); burst(ship.x, ship.y, "#ffd54a", 18); }
    }

    // enemy reaches bottom or hits ship
    for (const en of enemies) {
      if (en.dead) continue;
      const dx=en.x-ship.x, dy=en.y-ship.y, rr=en.r+ship.r*0.7;
      if (dx*dx+dy*dy < rr*rr) { en.dead = true; loseLife(); burst(ship.x, ship.y, "#ff7b54", 20); }
      else if (en.y - en.r > H) { en.dead = true; loseLife(); }
    }
    enemies = enemies.filter(e => !e.dead);

    // score floaters + particles
    for (const f of floaters) { if (f.kind==="text"){ f.y -= 40*dt; f.life -= dt; } }
    floaters = floaters.filter(f => (f.kind==="text" ? f.life>0 : (f.kind==="power" ? (!f.dead && f.y < H+30) : false)));
    for (const p of particles) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=240*dt; p.life-=dt; }
    particles = particles.filter(p => p.life>0);

    // stars drift down
    for (const s of stars) { s.y += s.s*dt; if (s.y>H){ s.y=0; s.x=Math.random()*W; } }

    if (best < score) { best = score; localStorage.setItem("sb_best_"+difficulty, best); }
    updateHud();
  }

  function shoot(spread){
    const speed = 560;
    bullets.push({ x: ship.x + spread*60, y: ship.y - ship.r, vy: -speed, r: 6, dead:false });
  }

  function spawnEnemy(rampMul){
    const t = ENEMY_TYPES[Math.floor(Math.random()*ENEMY_TYPES.length)];
    const r = t.r * (W<480 ? 0.85 : 1);
    const x = r + Math.random()*(W - r*2);
    enemies.push({
      kind:t.kind, x, y:-r-4, r, hp:t.hp, maxhp:t.hp, color:t.color, color2:t.color2, pts:t.pts,
      vy: cfg.fall * rampMul * (0.85 + Math.random()*0.3),
      wob: t.wob, wobAmp: 60, seed: Math.random()*6.28, dead:false,
      face: Math.random()<0.5?0:1,
    });
  }

  function spawnPower(x,y){ floaters.push({ kind:"power", x, y, vy: 90, r: 16, dead:false }); }

  function burst(x,y,color,n){
    for (let i=0;i<n;i++){ const a=Math.random()*6.28, sp=Math.random()*160+40;
      particles.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp - 40, life:0.5+Math.random()*0.3, color }); }
  }
  function addFloat(x,y,text){ floaters.push({ kind:"text", x, y, text, life:0.8 }); }

  function loseLife(){
    lives -= 1;
    updateHud();
    if (lives <= 0) gameOver();
  }

  function gameOver(){
    state = STATE.OVER;
    document.getElementById("finalScore").textContent = score;
    document.getElementById("bestScore").textContent = best;
    document.getElementById("overScreen").classList.remove("hidden");
    document.getElementById("hud").classList.add("hidden");
  }

  // ---- Draw ----
  function draw(){
    ctx.clearRect(0,0,W,H);
    // stars
    for (const s of stars){ ctx.globalAlpha=0.5+ (s.s/80); ctx.fillStyle="#cfe0ff"; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.28); ctx.fill(); }
    ctx.globalAlpha=1;

    // power-ups
    for (const p of floaters){ if (p.kind==="power") drawStar(p.x,p.y,p.r,"#ffd54a"); }

    // enemies
    for (const en of enemies) drawEnemy(en);

    // bullets
    for (const b of bullets){
      ctx.fillStyle="#ffe27a"; ctx.shadowColor="#ffd54a"; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,6.28); ctx.fill(); ctx.shadowBlur=0;
    }

    // ship
    if (state!==STATE.MENU) drawShip();

    // particles
    for (const p of particles){ ctx.globalAlpha=Math.max(0,p.life*2); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,4,0,6.28); ctx.fill(); }
    ctx.globalAlpha=1;

    // floating score text
    for (const f of floaters){ if (f.kind!=="text") continue;
      ctx.globalAlpha=Math.max(0,f.life/0.8); ctx.fillStyle="#fff"; ctx.font="bold "+Math.round(Math.min(W,H)*0.045)+"px Trebuchet MS"; ctx.textAlign="center";
      ctx.fillText(f.text, f.x, f.y); }
    ctx.globalAlpha=1;
  }

  function drawShip(){
    const s=ship; ctx.save(); ctx.translate(s.x,s.y);
    // thruster flame
    ctx.fillStyle="#ff7b54"; ctx.beginPath();
    ctx.moveTo(-7,s.r*0.6); ctx.lineTo(0, s.r*0.6 + 10 + Math.random()*8); ctx.lineTo(7,s.r*0.6); ctx.closePath(); ctx.fill();
    // body
    ctx.shadowColor="#8ad7ff"; ctx.shadowBlur=14;
    ctx.fillStyle="#8ad7ff"; ctx.beginPath();
    ctx.moveTo(0,-s.r); ctx.lineTo(s.r*0.8, s.r*0.7); ctx.lineTo(0, s.r*0.4); ctx.lineTo(-s.r*0.8, s.r*0.7); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
    // window
    ctx.fillStyle="#2a2a4a"; ctx.beginPath(); ctx.arc(0,-s.r*0.1,s.r*0.26,0,6.28); ctx.fill();
    // power glow ring
    if (elapsed < powerUntil){ ctx.strokeStyle="rgba(255,213,74,.8)"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,s.r+6,0,6.28); ctx.stroke(); }
    ctx.restore();
  }

  function drawEnemy(en){
    ctx.save(); ctx.translate(en.x,en.y);
    const g=ctx.createRadialGradient(-en.r*0.3,-en.r*0.3,en.r*0.1,0,0,en.r);
    g.addColorStop(0,en.color2); g.addColorStop(1,en.color);
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,en.r,0,6.28); ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle="rgba(0,0,0,.18)"; ctx.stroke();
    if (en.kind==="rock"){
      // craters
      ctx.fillStyle="rgba(0,0,0,.12)";
      ctx.beginPath(); ctx.arc(en.r*0.25,-en.r*0.1,en.r*0.18,0,6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(-en.r*0.2,en.r*0.25,en.r*0.13,0,6.28); ctx.fill();
      if (en.maxhp>1 && en.hp<en.maxhp){ ctx.strokeStyle="rgba(0,0,0,.35)"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-en.r*0.4,-en.r*0.2); ctx.lineTo(en.r*0.1,en.r*0.4); ctx.stroke(); }
    } else {
      // googly eyes + smile
      ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.arc(-en.r*0.32,-en.r*0.1,en.r*0.26,0,6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(en.r*0.32,-en.r*0.1,en.r*0.26,0,6.28); ctx.fill();
      ctx.fillStyle="#222";
      ctx.beginPath(); ctx.arc(-en.r*0.28,-en.r*0.05,en.r*0.12,0,6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(en.r*0.36,-en.r*0.05,en.r*0.12,0,6.28); ctx.fill();
      ctx.strokeStyle="#222"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,en.r*0.25,en.r*0.3,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
    }
    ctx.restore();
  }

  function drawStar(x,y,r,color){
    ctx.save(); ctx.translate(x,y); ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=12;
    ctx.beginPath();
    for (let i=0;i<10;i++){ const ang=Math.PI/5*i - Math.PI/2; const rad=i%2?r*0.45:r; ctx.lineTo(Math.cos(ang)*rad, Math.sin(ang)*rad); }
    ctx.closePath(); ctx.fill(); ctx.shadowBlur=0; ctx.restore();
  }

  // ---- HUD / UI ----
  function updateHud(){
    document.getElementById("hudScore").textContent = score;
    document.getElementById("hudBest").textContent = Math.max(best, score);
    document.getElementById("hudLives").textContent = "❤️".repeat(Math.max(0,lives)) + "🖤".repeat(Math.max(0,3-lives));
  }

  const picker = document.getElementById("speedPicker");
  function buildPicker(){
    picker.innerHTML="";
    for (const key of Object.keys(PRESETS)){
      const p=PRESETS[key];
      const b=document.createElement("button");
      b.className="btn speed"+(key===difficulty?" sel":"");
      b.innerHTML=p.label+'<span class="lab">'+p.sub+"</span>";
      b.onclick=()=>{ difficulty=key; localStorage.setItem("sb_diff",key); buildPicker(); };
      picker.appendChild(b);
    }
  }
  buildPicker();

  function startGame(){
    reset(); state=STATE.PLAY;
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("overScreen").classList.add("hidden");
    document.getElementById("hud").classList.remove("hidden");
  }
  function showMenu(){
    state=STATE.MENU; buildPicker();
    document.getElementById("startScreen").classList.remove("hidden");
    document.getElementById("overScreen").classList.add("hidden");
    document.getElementById("hud").classList.add("hidden");
  }
  document.getElementById("playBtn").onclick=startGame;
  document.getElementById("againBtn").onclick=startGame;
  document.getElementById("menuBtn").onclick=showMenu;

  // ---- test hook ----
  window.__sbtest = {
    start(){ startGame(); },
    getState(){ return { state, score, lives, enemies: enemies.length, bullets: bullets.length }; },
  };

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
