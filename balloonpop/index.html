<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Balloon Pop — Kid Edition</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎈</text></svg>" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #aee3ff;
    font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    color: #fff; touch-action: none; user-select: none;
  }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas {
    display: block; width: 100%; height: 100%;
    background: linear-gradient(180deg, #8fd4ff 0%, #bfe8ff 55%, #e7f7ff 100%);
    filter: saturate(1.4) contrast(1.04);
  }

  .overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    background: radial-gradient(120% 120% at 50% 30%, rgba(90,170,230,.4), rgba(40,110,170,.9));
    backdrop-filter: blur(3px);
  }
  .hidden { display: none !important; }

  h1 {
    font-size: clamp(40px, 12vw, 86px); margin: 0;
    color: #fff; letter-spacing: 1px;
    text-shadow: 0 4px 0 #f06292, 0 0 22px rgba(255,255,255,.6);
  }
  h1 .sub { display:block; font-size: clamp(13px,3.6vw,20px); letter-spacing:6px; color:#fff3c4; text-shadow:none; margin-top:6px; }
  p.tip { font-size: clamp(15px, 4vw, 20px); color: #f3fbff; max-width: 470px; line-height: 1.55; }

  .speeds { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin: 16px 0 4px; }
  .btn {
    cursor: pointer; border: none; border-radius: 16px; margin-top: 8px;
    padding: 16px 26px; font-size: clamp(17px, 4.6vw, 24px); font-weight: bold;
    color: #06324a; background: #ffe27a;
    box-shadow: 0 6px 0 #cba62f, 0 10px 22px rgba(0,0,0,.35);
    transition: transform .06s ease, box-shadow .06s ease;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #cba62f, 0 6px 14px rgba(0,0,0,.35); }
  .btn.pink { background: #ff9ec7; box-shadow: 0 6px 0 #c25c8c, 0 10px 22px rgba(0,0,0,.35); color:#fff; }
  .btn.pink:active { box-shadow: 0 2px 0 #c25c8c, 0 6px 14px rgba(0,0,0,.35); }
  .btn.speed { background: #9fe0ff; box-shadow: 0 6px 0 #4f9bc4, 0 10px 22px rgba(0,0,0,.35); color:#06324a; }
  .btn.speed:active { box-shadow: 0 2px 0 #4f9bc4, 0 6px 14px rgba(0,0,0,.35); }
  .btn.speed .lab { display:block; font-size: .6em; font-weight: normal; opacity: .85; margin-top: 2px; }
  .btn.speed.sel { outline: 4px solid #fff; }

  #hud {
    position: fixed; top: 12px; left: 0; right: 0; z-index: 5;
    display: flex; justify-content: center; align-items: center; gap: 24px;
    font-size: clamp(20px, 6vw, 30px); font-weight: bold;
    color: #06426a; text-shadow: 0 2px 4px rgba(255,255,255,.5); pointer-events: none;
  }
  #hud .lbl { font-size: .5em; color: #1d6fa0; display:block; text-align:center; }
  #hudLives { font-size: clamp(20px, 6vw, 30px); letter-spacing: 1px; }
  .score-big { font-size: clamp(44px, 13vw, 96px); margin: 6px 0; color:#fff; text-shadow:0 4px 0 #f06292; }
  .best { color: #fff3c4; font-size: clamp(15px, 4vw, 20px); }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>

<div id="hud" class="hidden">
  <div><span class="lbl">SCORE</span><span id="hudScore">0</span></div>
  <div id="hudLives">❤️❤️❤️</div>
  <div><span class="lbl">BEST</span><span id="hudBest">0</span></div>
</div>

<div id="startScreen" class="overlay">
  <h1>Balloon&nbsp;Pop<span class="sub">KID EDITION</span></h1>
  <p class="tip"><b>Tap the balloons</b> to pop them! 🎈<br>⭐ gold = bonus &nbsp; 🌈 rainbow = pop them all<br>💣 don't tap the bomb! (none in Baby mode)</p>
  <p class="tip" style="margin-top:2px">Pick how fast:</p>
  <div class="speeds" id="speedPicker"></div>
  <button class="btn" id="playBtn">▶ Play</button>
</div>

<div id="overScreen" class="overlay hidden">
  <h1 style="font-size:clamp(30px,9vw,62px)">Pop-tastic! 🎉</h1>
  <div class="score-big" id="finalScore">0</div>
  <div class="best">Best: <span id="bestScore">0</span></div>
  <button class="btn" id="againBtn">↻ Play Again</button>
  <button class="btn speed" id="menuBtn">⚙ Change Speed</button>
</div>

<script src="../rewards.js" data-game="balloonpop"></script>
<script>
(() => {
  "use strict";
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  // ---- Difficulty presets (gentle) ----
  // spawn = seconds between balloons; rise = float speed (px/s); bomb = bomb chance (0 in baby)
  const PRESETS = {
    baby:   { label: "Baby",   sub: "no bombs",   spawn: 0.95, rise: 55, bomb: 0.0,  ramp: 0.0  },
    easy:   { label: "Easy",   sub: "for kids",   spawn: 0.8,  rise: 75, bomb: 0.07, ramp: 0.08 },
    normal: { label: "Normal", sub: "a challenge",spawn: 0.62, rise: 100,bomb: 0.12, ramp: 0.18 },
  };
  let difficulty = localStorage.getItem("bp_diff") || "easy";

  // ---- Canvas ----
  let W=0,H=0,DPR=1;
  function resize(){
    DPR = Math.min(window.devicePixelRatio||1,2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width=Math.floor(W*DPR); canvas.height=Math.floor(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener("resize", resize); resize();

  // ---- Clouds (decor) ----
  let clouds = [];
  function makeClouds(){
    clouds = [];
    const n = Math.max(3, Math.round(W/240));
    for (let i=0;i<n;i++) clouds.push({ x:Math.random()*W, y:Math.random()*H*0.7, s:Math.random()*0.5+0.4, v:Math.random()*8+4 });
  }
  makeClouds(); window.addEventListener("resize", makeClouds);

  const BALLOON_COLORS = [
    {c:"#ff6b6b",h:"#ffb3b3"},{c:"#ffa94d",h:"#ffd6a8"},{c:"#ffd43b",h:"#ffe98a"},
    {c:"#69db7c",h:"#b2f2bb"},{c:"#4dabf7",h:"#a5d8ff"},{c:"#b197fc",h:"#d0bfff"},{c:"#f783ac",h:"#fcc2d7"},
  ];

  // ---- State (arrays initialized up front so draw() never throws on the menu) ----
  const STATE = { MENU:0, PLAY:1, OVER:2 };
  let state = STATE.MENU;
  let balloons = [], pops = [], floaters = [];
  let cfg = PRESETS[difficulty];
  let score = 0, lives = 3, best = +(localStorage.getItem("bp_best_"+difficulty)||0);
  let spawnTimer = 0, elapsed = 0, combo = 0, comboTimer = 0, shake = 0;

  function reset(){
    cfg = PRESETS[difficulty];
    balloons = []; pops = []; floaters = [];
    score = 0; lives = 3; spawnTimer = 0.3; elapsed = 0; combo = 0; comboTimer = 0; shake = 0;
    best = +(localStorage.getItem("bp_best_"+difficulty)||0);
    updateHud();
  }

  // ---- Input: tap a balloon to pop it ----
  function tap(x,y){
    if (state!==STATE.PLAY) return;
    // topmost (highest = smallest y) first feels best, but nearest is fine; check from newest
    for (let i=balloons.length-1;i>=0;i--){
      const b = balloons[i];
      const dx=x-b.x, dy=y-(b.y), rr=b.r*1.15;
      if (dx*dx+dy*dy <= rr*rr){ popBalloon(i); return; }
    }
  }
  canvas.addEventListener("pointerdown", (e)=>{ e.preventDefault(); tap(e.clientX, e.clientY); });

  // ---- Loop ----
  let last=0;
  function frame(t){
    const dt = Math.min((t-last)/1000,0.033)||0; last=t;
    if (state===STATE.PLAY) update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  function update(dt){
    elapsed += dt;
    const rampMul = 1 + (cfg.ramp * Math.min(elapsed/60,1));
    if (comboTimer>0){ comboTimer-=dt; if (comboTimer<=0) combo=0; }
    if (shake>0) shake-=dt;

    // spawn
    spawnTimer -= dt;
    if (spawnTimer<=0){ spawnTimer = cfg.spawn/rampMul*(0.7+Math.random()*0.6); spawnBalloon(rampMul); }

    // rise + sway
    for (const b of balloons){
      b.y -= b.vy*dt;
      b.sway += dt;
      b.x = b.baseX + Math.sin(b.sway*1.6 + b.seed)*b.swayAmp;
    }
    // escaped off the top (no penalty — stays gentle)
    balloons = balloons.filter(b => b.y > -b.r*2.2);

    // pop animations + floaters
    for (const p of pops){ p.life-=dt; p.r += dt*90; }
    pops = pops.filter(p=>p.life>0);
    for (const f of floaters){ f.y -= 40*dt; f.life-=dt; }
    floaters = floaters.filter(f=>f.life>0);

    // clouds drift
    for (const c of clouds){ c.x += c.v*dt; if (c.x - 120 > W) c.x = -120; }

    if (best<score){ best=score; localStorage.setItem("bp_best_"+difficulty, best); }
    updateHud();
  }

  function spawnBalloon(rampMul){
    let kind = "normal";
    const r = Math.random();
    if (r < cfg.bomb) kind = "bomb";
    else if (r < cfg.bomb + 0.03) kind = "rainbow";
    else if (r < cfg.bomb + 0.10) kind = "gold";
    const rad = (kind==="bomb" ? 30 : 26 + Math.random()*14) * (W<480?0.85:1);
    const baseX = rad + Math.random()*(W - rad*2);
    balloons.push({
      kind, x: baseX, baseX, y: H + rad + 10, r: rad,
      vy: cfg.rise * rampMul * (0.85 + Math.random()*0.35),
      colIdx: Math.floor(Math.random()*BALLOON_COLORS.length),
      sway: 0, seed: Math.random()*6.28, swayAmp: 14 + Math.random()*20,
    });
  }

  function popBalloon(i){
    const b = balloons[i];
    if (b.kind === "bomb"){
      balloons.splice(i,1);
      loseLife(); shake = 0.4; combo = 0;
      burst(b.x,b.y,"#444",18); addFloat(b.x,b.y,"💣");
      return;
    }
    balloons.splice(i,1);
    combo += 1; comboTimer = 1.0;
    const mult = 1 + Math.floor(combo/5);
    if (b.kind === "gold"){ score += 5*mult; addFloat(b.x,b.y,"+"+(5*mult)+" ⭐"); shower(b.x,b.y); }
    else if (b.kind === "rainbow"){
      // pop everything currently on screen
      let n = 0;
      for (let j=balloons.length-1;j>=0;j--){ if (balloons[j].kind!=="bomb"){ const bb=balloons[j]; burst(bb.x,bb.y,BALLOON_COLORS[bb.colIdx].c,10); balloons.splice(j,1); n++; } }
      score += (1+n)*mult; addFloat(b.x,b.y,"🌈 +"+((1+n)*mult));
      burst(b.x,b.y,"#fff",20);
    } else {
      score += 1*mult; addFloat(b.x,b.y, mult>1 ? "+"+mult : "+1");
    }
    burst(b.x,b.y,BALLOON_COLORS[b.colIdx].c,12);
    if (combo>=5 && combo%5===0) addFloat(b.x,b.y-30,"COMBO x"+mult);
    updateHud();
  }

  function loseLife(){ lives-=1; updateHud(); if (lives<=0) gameOver(); }

  function burst(x,y,color,n){
    pops.push({ x, y, r: 6, life: 0.3, color, ring:true });
    for (let i=0;i<n;i++){ const a=Math.random()*6.28, sp=Math.random()*160+50;
      pops.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, r:4, life:0.5+Math.random()*0.3, color }); }
  }
  function shower(x,y){ for(let i=0;i<14;i++){ const a=Math.random()*6.28, sp=Math.random()*180+60; pops.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:3,life:0.6,color:"#ffd43b"});} }
  function addFloat(x,y,text){ floaters.push({ x,y,text,life:0.9 }); }

  function gameOver(){
    state = STATE.OVER;
    document.getElementById("finalScore").textContent = score;
    document.getElementById("bestScore").textContent = best;
    document.getElementById("overScreen").classList.remove("hidden");
    document.getElementById("hud").classList.add("hidden");
  }

  // ---- Draw ----
  function draw(){
    ctx.save();
    if (shake>0){ const m=shake*14; ctx.translate((Math.random()-0.5)*m,(Math.random()-0.5)*m); }
    ctx.clearRect(-20,-20,W+40,H+40);

    // clouds
    for (const c of clouds) drawCloud(c.x,c.y,c.s);

    // balloons
    for (const b of balloons) drawBalloon(b);

    // pop particles
    for (const p of pops){
      ctx.globalAlpha = Math.max(0, p.life*2.2);
      if (p.ring){ ctx.strokeStyle=p.color; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.stroke(); }
      else { if (p.vx!=null){ p.x+=p.vx*0.016; p.y+=p.vy*0.016; } ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill(); }
    }
    ctx.globalAlpha=1;

    // floating text
    for (const f of floaters){ ctx.globalAlpha=Math.max(0,f.life/0.9); ctx.fillStyle="#fff"; ctx.strokeStyle="rgba(0,0,0,.25)"; ctx.lineWidth=3;
      ctx.font="bold "+Math.round(Math.min(W,H)*0.05)+"px Trebuchet MS"; ctx.textAlign="center";
      ctx.strokeText(f.text,f.x,f.y); ctx.fillText(f.text,f.x,f.y); }
    ctx.globalAlpha=1;
    ctx.restore();
  }

  function drawCloud(x,y,s){
    ctx.fillStyle="rgba(255,255,255,.75)";
    ctx.beginPath();
    ctx.arc(x,y,26*s,0,6.28); ctx.arc(x+28*s,y+6*s,20*s,0,6.28); ctx.arc(x-28*s,y+6*s,20*s,0,6.28);
    ctx.arc(x+8*s,y-12*s,18*s,0,6.28); ctx.fill();
  }

  function drawBalloon(b){
    ctx.save(); ctx.translate(b.x,b.y);
    // string
    ctx.strokeStyle="rgba(255,255,255,.6)"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,b.r*0.95); ctx.quadraticCurveTo(b.r*0.2, b.r*1.4, 0, b.r*1.8); ctx.stroke();
    if (b.kind==="bomb"){
      ctx.fillStyle="#3a3a3a"; ctx.beginPath(); ctx.arc(0,0,b.r,0,6.28); ctx.fill();
      ctx.strokeStyle="#777"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,b.r*0.7,0,6.28); ctx.stroke();
      // fuse
      ctx.strokeStyle="#caa"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,-b.r); ctx.lineTo(b.r*0.3,-b.r*1.4); ctx.stroke();
      ctx.fillStyle="#ffb347"; ctx.beginPath(); ctx.arc(b.r*0.3,-b.r*1.4,4,0,6.28); ctx.fill();
      ctx.restore(); return;
    }
    let col;
    if (b.kind==="gold") col={c:"#ffce3a",h:"#fff3b0"};
    else col = BALLOON_COLORS[b.colIdx];
    const g=ctx.createRadialGradient(-b.r*0.3,-b.r*0.4,b.r*0.1,0,0,b.r);
    g.addColorStop(0,col.h); g.addColorStop(1,col.c);
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.ellipse(0,0,b.r*0.92,b.r,0,0,6.28); ctx.fill();
    // knot
    ctx.fillStyle=col.c; ctx.beginPath(); ctx.moveTo(-4,b.r*0.92); ctx.lineTo(4,b.r*0.92); ctx.lineTo(0,b.r*1.05); ctx.closePath(); ctx.fill();
    // shine
    ctx.fillStyle="rgba(255,255,255,.55)"; ctx.beginPath(); ctx.ellipse(-b.r*0.3,-b.r*0.35,b.r*0.18,b.r*0.28,-0.5,0,6.28); ctx.fill();
    if (b.kind==="gold"){ ctx.fillStyle="#a8780a"; ctx.font="bold "+Math.round(b.r)+"px Trebuchet MS"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("★",0,2); }
    if (b.kind==="rainbow"){
      ctx.globalCompositeOperation="source-atop";
      const rg=ctx.createLinearGradient(-b.r,0,b.r,0);
      ["#ff6b6b","#ffd43b","#69db7c","#4dabf7","#b197fc"].forEach((c,i,a)=>rg.addColorStop(i/(a.length-1),c));
      ctx.fillStyle=rg; ctx.globalAlpha=0.85; ctx.beginPath(); ctx.ellipse(0,0,b.r*0.92,b.r,0,0,6.28); ctx.fill();
      ctx.globalAlpha=1; ctx.globalCompositeOperation="source-over";
    }
    ctx.restore();
  }

  // ---- HUD / UI ----
  function updateHud(){
    document.getElementById("hudScore").textContent = score;
    document.getElementById("hudBest").textContent = Math.max(best,score);
    const showLives = cfg.bomb>0; // baby mode has no bombs -> no lives shown
    const el = document.getElementById("hudLives");
    el.style.visibility = showLives ? "visible" : "hidden";
    el.textContent = "❤️".repeat(Math.max(0,lives)) + "🖤".repeat(Math.max(0,3-lives));
  }

  const picker = document.getElementById("speedPicker");
  function buildPicker(){
    picker.innerHTML="";
    for (const key of Object.keys(PRESETS)){
      const p=PRESETS[key];
      const b=document.createElement("button");
      b.className="btn speed"+(key===difficulty?" sel":"");
      b.innerHTML=p.label+'<span class="lab">'+p.sub+"</span>";
      b.onclick=()=>{ difficulty=key; localStorage.setItem("bp_diff",key); buildPicker(); };
      picker.appendChild(b);
    }
  }
  buildPicker();

  function startGame(){
    reset(); state=STATE.PLAY;
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("overScreen").classList.add("hidden");
    document.getElementById("hud").classList.remove("hidden");
  }
  function showMenu(){
    state=STATE.MENU; buildPicker();
    document.getElementById("startScreen").classList.remove("hidden");
    document.getElementById("overScreen").classList.add("hidden");
    document.getElementById("hud").classList.add("hidden");
  }
  document.getElementById("playBtn").onclick=startGame;
  document.getElementById("againBtn").onclick=startGame;
  document.getElementById("menuBtn").onclick=showMenu;

  // ---- test hook ----
  window.__bptest = {
    start(){ startGame(); },
    getState(){ return { state, score, lives, balloons: balloons.length }; },
    getBalloons(){ return balloons.map(b=>({x:b.x,y:b.y,r:b.r,kind:b.kind})); },
  };

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
